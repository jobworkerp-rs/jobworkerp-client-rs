name: Release Client Binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-linux-x86_64:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: true

      - name: Install Protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin jobworkerp-client

      - name: Prepare release asset
        run: cp target/release/jobworkerp-client jobworkerp-client-linux-x86_64

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: jobworkerp-client-linux-x86_64
